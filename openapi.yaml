# FabAssetsManager — OpenAPI Specification
# Local API contract for the FabAssetsManager service.

openapi: 3.1.0
info:
  title: FabAssetsManager API
  description: Local API to manage and query your Fab.com asset library. 5002 is the default port and can be changed in the config. Favorites/comments annotations are frontend-local (localStorage) and intentionally outside this API contract.
  version: 1.0.2
servers:
  - url: http://localhost:5002
    description: Local development server

paths:
  /api/assets:
    get:
      summary: List all cached assets
      description: Returns the full list of assets stored in the local cache in a flattened format.
      responses:
        '200':
          description: A list of flattened assets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './_helpers/asset_output_schema_full.json#/$defs/asset'

  /api/assets/query:
    post:
      summary: Query cached assets with server-side filtering and pagination
      description: Returns a paged slice of flattened assets plus counts and facets for UI filters.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                page:
                  type: integer
                  minimum: 0
                  default: 0
                per_page:
                  type: integer
                  minimum: 1
                  maximum: 200
                  default: 50
                search:
                  type: string
                sort:
                  type: string
                  enum:
                    [title_asc, title_desc, seller_asc, seller_desc, type_asc, type_desc, format_asc, format_desc, date_asc, date_desc, updated_desc]
                include_all_uids:
                  type: boolean
                include_all_items:
                  type: boolean
                filters:
                  type: object
                  properties:
                    engines:
                      type: array
                      items:
                        type: string
                    licenses:
                      type: array
                      items:
                        type: string
                    formats:
                      type: array
                      items:
                        type: string
                    sellers:
                      type: array
                      items:
                        type: string
                    types:
                      type: array
                      items:
                        type: string
                    ue_max:
                      type: array
                      items:
                        type: string
                    only_downloadable:
                      type: boolean
                    only_discounted:
                      type: boolean
                    hide_mature:
                      type: boolean
      responses:
        '200':
          description: Query result with page items, counts and facets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: './_helpers/asset_output_schema_full.json#/$defs/asset'
                  page:
                    type: integer
                  per_page:
                    type: integer
                  page_count:
                    type: integer
                  total_count:
                    type: integer
                  filtered_count:
                    type: integer
                  facets:
                    type: object
                    additionalProperties:
                      type: object
                      additionalProperties:
                        type: integer
                  all_uids:
                    type: array
                    items:
                      type: string
                  all_items:
                    type: array
                    items:
                      $ref: './_helpers/asset_output_schema_full.json#/$defs/asset'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /api/config:
    get:
      summary: Read runtime configuration
      description: Returns whether authentication data and logging settings are configured locally.
      responses:
        '200':
          description: Runtime config summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_cookies:
                    type: boolean
                  has_user_agent:
                    type: boolean
                  user_agent:
                    type: string
                  cookies_preview:
                    type: string
                  log_level:
                    type: string
                  log_output:
                    type: string
                  debug_mode:
                    type: boolean
    post:
      summary: Save runtime configuration
      description: Persists cookies, user-agent, and logging settings from the web UI.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cookies]
              properties:
                cookies:
                  type: string
                user_agent:
                  type: string
                log_level:
                  type: string
                log_output:
                  type: string
      responses:
        '200':
          description: Configuration saved.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /api/config/logging:
    post:
      summary: Save logging preferences
      description: Persists logging settings and applies them immediately.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                level:
                  type: string
                output:
                  type: string
      responses:
        '200':
          description: Logging configuration saved.
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /api/diagnostic:
    get:
      summary: Backend prerequisites diagnostic
      description: Returns a local diagnostic report for auth/config/storage/cache preconditions without fetching data from Fab.com.
      responses:
        '200':
          description: Diagnostic report.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  auth:
                    type: object
                    properties:
                      cookies_present:
                        type: boolean
                      cookies_length:
                        type: integer
                      user_agent_present:
                        type: boolean
                  storage:
                    type: object
                    properties:
                      assets_dir:
                        type: object
                      previews_dir:
                        type: object
                      config_dir:
                        type: object
                  cache:
                    type: object
                    properties:
                      metadata_present:
                        type: boolean
                      reported_count:
                        type: integer
                      last_update:
                        type: string
                        nullable: true
                  hints:
                    type: array
                    items:
                      type: string

  /api/test:
    get:
      summary: Flask test route
      description: Lightweight health check for the Flask app.
      responses:
        '200':
          description: Test response.

  /api/lookup:
    get:
      summary: Lookup an asset
      description: Search for an asset in the local cache by UID, name, or Fab URL.
      parameters:
        - name: uid
          in: query
          schema:
            type: string
          description: Exact Fab UID of the asset.
        - name: name
          in: query
          schema:
            type: string
          description: Substring match on the asset title.
        - name: url
          in: query
          schema:
            type: string
          description: Fab.com listing URL (UID will be extracted).
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  query:
                    type: object
                  count:
                    type: integer
                  matches:
                    type: array
                    items:
                      $ref: './_helpers/asset_output_schema_full.json#/$defs/asset'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /api/missing_details:
    get:
      summary: List assets missing details
      description: Returns the list of UIDs that still need enrichment. Accepts an optional comma-separated uids query parameter.
      parameters:
        - name: uids
          in: query
          schema:
            type: string
          description: Optional comma-separated list of UIDs to inspect.
      responses:
        '200':
          description: UIDs missing detail payloads.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
    post:
      summary: List assets missing details from JSON payload
      description: Same as GET, but reads the UIDs from a JSON body.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                uids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: UIDs missing detail payloads.

  /api/details/{uid}:
    get:
      summary: Get enriched asset details
      description: Returns detailed information for a specific asset. Fetches from Fab.com if not already cached.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Enriched asset data.
          content:
            application/json:
              schema:
                $ref: './_helpers/asset_output_schema_full.json#/$defs/asset'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /api/status:
    get:
      summary: Cache status summary
      description: Returns a lightweight view of the current cache size and presence.
      responses:
        '200':
          description: Cache status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  cached:
                    type: integer
                  has_cache:
                    type: boolean

  /api/fetch:
    post:
      summary: Sync library from Fab.com
      description: Triggers a synchronization of your Fab.com library.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_mode:
                  type: string
                  enum: [partial, full]
                  default: partial
      responses:
        '200':
          description: Sync results.
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /api/cache-info:
    get:
      summary: Cache metadata
      description: Returns cache metadata used by the UI badge and sync state.
      responses:
        '200':
          description: Cache metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_cache:
                    type: boolean
                  count:
                    type: integer
                  timestamp:
                    type: string
                    nullable: true
                  last_sync_at:
                    type: string
                    nullable: true
                  last_sync_label:
                    type: string
                    nullable: true
                  age_seconds:
                    type: number
                    nullable: true
                  age_human:
                    type: string
                    nullable: true

  /api/image/{uid}:
    get:
      summary: Get asset thumbnail
      description: Returns the JPEG thumbnail for the asset. Downloads it on the fly if missing.
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: JPEG Image.
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /api/clear_previews:
    post:
      summary: Efface les previews locales
      description: Supprime toutes les images de prévisualisation enregistrées localement dans le dossier des previews.
      responses:
        '200':
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  deleted_count:
                    type: integer
        '500':
          description: Erreur serveur

  /api/clear_cache:
    post:
      summary: Efface le cache local
      description: Supprime tous les fichiers de cache des assets et remet à zéro l'état du cache.
      responses:
        '200':
          description: Succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  deleted_count:
                    type: integer
        '500':
          description: Erreur serveur

  /api/export-templates:
    get:
      summary: Get export templates
      description: Returns the list of available custom export templates used by the frontend custom export modal.
      responses:
        '200':
          description: A dictionary of export profiles.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    description:
                      type: string
                    pattern:
                      type: string
                  required: [description, pattern]

  /api/export/json:
    post:
      summary: Export cached assets as JSON
      description: Returns a downloadable JSON export of cached assets, optionally filtered by selected UIDs.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                selected_uids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: JSON export.

  /api/export/csv:
    post:
      summary: Export cached assets as CSV
      description: Returns a downloadable CSV export of cached assets, optionally filtered by selected UIDs.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                selected_uids:
                  type: array
                  items:
                    type: string
                columns:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: CSV export.

  /api/export/headless:
    post:
      summary: Export cached assets to local disk
      description: Writes a JSON or CSV export to a local output path for automation scripts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                format:
                  type: string
                  enum: [json, csv]
                  default: json
                output_path:
                  type: string
                output_dir:
                  type: string
                file_name:
                  type: string
                selected_uids:
                  type: array
                  items:
                    type: string
                columns:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: File successfully written on disk.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  path:
                    type: string
                  count:
                    type: integer
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

components:
  responses:
    ErrorResponse:
      description: Standardized error response.
      content:
        application/json:
          schema:
            $ref: './_helpers/error_response_contract.json'
